name: EV Monitor - Coleta periódica

on:
  schedule:
    # A cada 5 minutos (o mínimo que o GitHub permite; pode haver
    # atraso de alguns minutos em horários de pico do GitHub).
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Permite rodar manualmente pelo botão "Run workflow" na aba Actions.

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar uma coleta
        run: python -c "from scheduler import run_once; run_once()"

      - name: Salvar dados atualizados no repositório
        run: |
          git config user.name "ev-monitor-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: atualiza dados de coleta [skip ci]"
          git push
